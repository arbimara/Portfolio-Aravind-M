<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Aravind M</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <nav class="navbar">
        <a href="index.html" class="logo">Portfolio.</a>
        <div class="nav-links">
            <a href="index.html#work">Work</a>
            <a href="index.html#contact" class="btn-contact">Contact</a>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="container container-text">
                <h1 class="section-title">Say Hello 👋</h1>
                <p class="about-text" style="text-align: center; margin-bottom: 40px;">
                    Fill out the form below to get in touch. I'll get back to you as soon as possible.
                </p>

                <form action="https://formsubmit.co/aravindhmaran1@gmail.com" method="POST" class="contact-form">
                    <!-- Hidden configuration for FormSubmit -->
                    <!-- <input type="hidden" name="_next" value="http://YOUR_GITHUB_PAGES_URL/index.html"> -->
                    <input type="hidden" name="_subject" value="New Portfolio Contact Submission">
                    <input type="hidden" name="_captcha" value="false">

                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="mobile" class="form-label">Mobile Number (Optional)</label>
                        <input type="tel" id="mobile" name="mobile" class="form-input" placeholder="+91 98765 43210">
                    </div>

                    <div class="form-group">
                        <label for="message" class="form-label">Message</label>
                        <textarea id="message" name="message" class="form-input" rows="5"
                            placeholder="How can I help you?" required></textarea>
                    </div>

                    <div style="text-align: center;">
                        <button type="submit" class="btn primary huge-btn" style="width: 100%;">Send Message</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
